<html lang="de-CH">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --sans:'IBM Plex Sans',Inter,'Segoe UI',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,Consolas,monospace;
  --serif:'Spectral',Georgia,serif;
  --accent:#7d4a23;
  --accent-deep:#5e3717;
  --line:#bd9f7e;
  --bg:#ede6d4;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;overflow:hidden}
body{background:var(--bg);color:#191713;font-family:var(--sans);-webkit-font-smoothing:antialiased}

@keyframes wpshake{
  0%,100%{transform:translateY(-50%) translateX(0)}
  20%{transform:translateY(-50%) translateX(-4px)}
  40%{transform:translateY(-50%) translateX(4px)}
  60%{transform:translateY(-50%) translateX(-3px)}
  80%{transform:translateY(-50%) translateX(3px)}
}
@keyframes wpPulse{
  0%,100%{transform:scale(1);opacity:.9}
  50%{transform:scale(1.22);opacity:1}
}
@keyframes linePulse{
  0%,100%{stroke-opacity:.35}
  50%{stroke-opacity:.9}
}

#bg-img{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url('assets/werkstatt_a.png');
  background-size:cover;background-position:center 30%;opacity:.8;
}
#bg-grad{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:linear-gradient(to bottom right,#ede6d4 0%,#ede6d4 5%,rgba(237,230,212,.3) 55%,rgba(237,230,212,0) 100%);
}
#map{position:relative;z-index:1;width:100%;height:100vh;box-sizing:border-box}

#title-block{
  position:absolute;left:clamp(18px,3vw,34px);top:22px;z-index:4;
  pointer-events:none;max-width:480px;
}
#title-label{
  font:700 .58rem/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;
  color:rgba(80,42,8,.45);margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#title-h1{font:800 3rem/1 var(--sans);color:#18100a;margin:0 0 11px;letter-spacing:-.03em}
#title-tag{font:italic 400 .95rem/1.5 var(--serif);color:#7a5020;margin:0}
#title-time{font:500 .56rem/1.8 var(--mono);font-style:normal;color:rgba(80,42,8,.38);letter-spacing:.08em}

#svg-lines{position:absolute;inset:0;overflow:visible;pointer-events:none;z-index:20}

.waypoint{
  position:absolute;display:flex;align-items:center;gap:13px;
  cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none;
  outline:none;z-index:10;transform:translateY(-50%);
}
body.draft-mode .waypoint{cursor:grab}
body:not(.draft-mode) .cp-handle{display:none}
#draft-export-btn{
  display:none;position:fixed;right:16px;bottom:16px;z-index:80;
  font:600 .74rem/1 var(--mono);letter-spacing:.04em;color:#fff3df;
  background:rgba(26,18,10,.86);border:1px solid rgba(214,200,180,.3);
  border-radius:6px;padding:9px 14px;cursor:pointer;
}
body.draft-mode #draft-export-btn{display:block}
#draft-export-btn:hover{background:var(--accent,#9a6a1f)}
.waypoint:focus-visible{outline:2px solid var(--accent)}
.wp-dot{flex:none;border-radius:50%}
.wp-meta{font:600 .64rem/1 var(--mono);letter-spacing:.08em;color:#9a8d7b;margin-bottom:4px}
.wp-title{font:600 .94rem/1.18 var(--sans);letter-spacing:-.01em;color:#191713;transition:font-size .15s,color .15s}
.wp-hint{margin-top:5px;font:600 .62rem/1 var(--mono);letter-spacing:.08em;color:var(--accent-deep)}
.wp-ann-meta{font:600 .62rem/1 var(--mono);letter-spacing:.08em;color:#b7a994;margin-bottom:3px}
.wp-ann-title{font:600 .82rem/1.2 var(--sans);color:#9d8f7c}
.wp-ann-pub{font:500 .6rem/1.2 var(--mono);letter-spacing:.03em;color:#c0b3a0;margin-top:3px}

#expanded-overlay{position:fixed;inset:0;z-index:55;display:none}
#expanded-card{
  position:fixed;top:20px;right:20px;width:min(500px,calc(100vw - 40px));
  z-index:60;background:#fffaf0;border:1px solid #b8a78d;border-radius:2px;
  box-shadow:0 22px 50px rgba(48,35,18,.28);overflow:hidden;display:none;
}
#card-photo{display:flex;align-items:flex-start;justify-content:flex-start;min-height:220px;background-size:cover;background-position:center}
#card-inner{padding:20px 22px;max-width:66%;text-align:left}
#card-meta{font:600 .68rem/1 var(--mono);letter-spacing:.12em;color:#ffd9a8;margin-bottom:10px;text-shadow:0 1px 8px rgba(20,12,4,.7)}
#card-title{font:600 1.18rem/1.18 var(--sans);letter-spacing:-.01em;color:#fffaf0;margin:0;text-shadow:0 1px 8px rgba(20,12,4,.7)}
#card-abs{font-family:var(--serif);font-size:.98rem;line-height:1.55;color:#f6ecdd;margin:10px 0 0;text-shadow:0 1px 8px rgba(20,12,4,.7)}
#card-link{display:inline-block;margin-top:14px;font:600 .72rem/1 var(--mono);letter-spacing:.06em;color:#ffd9a8;text-decoration:none;border-bottom:1.5px solid #ffd9a8;padding-bottom:3px;text-shadow:0 1px 8px rgba(20,12,4,.7)}
#card-link:hover{color:#fff}

#footer{
  position:fixed;bottom:0;left:0;right:0;z-index:200;pointer-events:none;
  padding:0 0 13px;display:flex;justify-content:center;
}
#footer span{font:500 .6rem/1 var(--mono);color:#7d4a23;letter-spacing:.05em;white-space:nowrap}

.cp-handle{cursor:crosshair;pointer-events:all}
</style>

<script>
(function(){
'use strict';

/* ── DATA ─────────────────────────────────────────────────────────── */
var NOTES = [
  {
    id:'01', kurztitel:'NEUGIERDE',
    titel:'AM ANFANG STEHT DIE NEUGIERDE',
    datum:'2025-07-20', datum_publish:'2026-06-22',
    abstract:'Wie aus einer Planungsfrage an GPT ein didaktisches Dessertbuffet entsteht — und am Schluss neue Ideen einen Anfang markieren.',
    status:'LIVE', url:'notes/neugierde/index.html',

  },
  {

    status:'LIVE', url:'notes/unterrichtsentwurf-vision/index.html',
    hero:'heroes/hero_02_2x1_ai_260707_1536x768.png', heroAnchor:'tl',
    geht_nach:[{ref:'03',typ:'Zweig'},{ref:'04',typ:'Zweig'},{ref:'05',typ:'Zweig'}]
  },
  {
    id:'03', kurztitel:'WERKZEUGE',
    titel:'UNTERRICHTSENTWURF — WERKZEUGE',
    datum:'2025-08-12', datum_publish:null,
    abstract:'Was in der Vision als Idee aufblitzt, wird zur Werkstatt: Die ersten Werkzeuge werden gebaut.',
    status:'ANNOUNCED', url:null, hero:null,
    geht_nach:[]
  },
  {
    id:'04', kurztitel:'LETS YAML',
    titel:'LETS YAML',
    datum:'2025-08-18', datum_publish:null,
    abstract:'Warum eine schlichte Textstruktur zum Rückgrat des entstehenden Systems wird. Der YAML-Strang führt später zur Baumhaus-Architektur zurück.',
    status:'ANNOUNCED', url:null, hero:null,
    geht_nach:[{ref:'06',typ:'Zweig'}]
  },
  {
    id:'05', kurztitel:'LETS PLAY',
    titel:'LETS PLAY — GAMIFICATION',
    datum:'2025-08-25', datum_publish:null,
    abstract:'Offener Seitenzweig: Gamification-Konzepte treffen auf den Unterrichtsalltag. Der Konflikt zwischen Spiel und Ernst bleibt unaufgelöst.',
    status:'ANNOUNCED', url:null, hero:null,
    geht_nach:[]
  },
  {
    id:'06', kurztitel:'KI LERNT',
    titel:'DIE KI LERNT EINE SPRACHE',
    datum:'2025-09-15', datum_publish:null,
    abstract:'Der Sprach-, Prompt- und YAML-Strang: Wie die KI eine eigene Sprache für den Unterrichtsdialog entwickelt.',
    status:'ANNOUNCED', url:null, hero:null,
    geht_nach:[]
  }
];

var DEFAULTS = {
  '01':{x:0.05802083233992259, y:0.3026027397260274},
  '02':{x:0.08427082538604735, y:0.5843836118097174},
  '03':{x:0.29187498410542806, y:0.3675342005899508},
  '04':{x:0.2121875278155009, y:0.6052055463398973},
  '05':{x:0.1127083194255829, y:0.7847945205479452},
  '06':{x:0.25708332538604733, y:0.5153424824753854}
};

/* HUM-fixierte Kurven-Griffe aus Draft-Mode-Export 260706 (Bezier-Feintuning).
   Fix 260706b: cps wird jetzt normiert (0..1) gespeichert/gelesen (siehe gc()),
   wie DEFAULTS/positions -> bleibt bei jeder Fenstergroesse korrekt platziert.
   Diese Werte sind aus den urspruenglich exportierten Absolut-Pixeln anhand
   des zuletzt verifizierten Testfensters (1528x717) zurückgerechnet — bei
   Bedarf im Draft-Mode einmal neu ziehen+exportieren fuer echte Praezision. */
var DEFAULT_CPS = {
  '02-04':{x:0.08372868729818756, y:0.7825527004362667},
  '02-03':{x:0.12443960097670097, y:0.4942437713686259},
  '02-05':{x:0.06577369776012319, y:0.711577173156108},
  '04-06':{x:0.26480096400255754, y:0.5341234969887561}
};

var LS_POS = 'fn-storyline-v7';
var LS_CPS = 'fn-sl-cps-v7';

/* ── DRAFT MODE (?draft=1): erlaubt HUMAN das Verschieben der Knoten/
   Kurven-Griffe zum Feintuning. Ohne den Query-Parameter ist die Seite
   fuer normale Besucher statisch (kein Draggen), Expand bleibt immer an. */
var DRAFT_MODE = /(?:^|[?&])draft=1(?:&|$)/.test(location.search);
if (DRAFT_MODE) document.body.classList.add('draft-mode');

/* ── STATE ─────────────────────────────────────────────────────────── */
var cw = window.innerWidth, mapH = window.innerHeight;
var hoverId = null, expandedId = null, shakeId = null;
var dragId = null, cpDragId = null;
var positions = {}, cps = {};
for (var _k in DEFAULT_CPS) cps[_k] = DEFAULT_CPS[_k];

try { positions = JSON.parse(localStorage.getItem(LS_POS)||'{}'); } catch(e){}
try {
  var _lsCps = JSON.parse(localStorage.getItem(LS_CPS)||'{}');
  for (var _k2 in _lsCps) cps[_k2] = _lsCps[_k2];
} catch(e){}

/* ── HELPERS ───────────────────────────────────────────────────────── */
function fmt(iso) {
  if (!iso) return 'TBD';
  var p = iso.split('-');
  return p[2]+'.'+p[1]+'.'+p[0];
}

function posOf(id) {
  var p = positions[id];
  if (p) return {x: p.x*cw, y: p.y*mapH};
  var d = DEFAULTS[id];
  return d ? {x: d.x*cw, y: d.y*mapH} : {x: cw*.5, y: mapH*.5};
}

function gc(eid, p1, p2) {
  /* cps ist normiert (0..1, wie DEFAULTS/positions) gespeichert -> hier
     denormieren. Fix 260706: fruehere Version speicherte absolute Pixel,
     dadurch waren Kurven bei abweichender Fenstergroesse falsch platziert. */
  if (cps[eid]) return {x: cps[eid].x*cw, y: cps[eid].y*mapH};
  var mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
  var dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.sqrt(dx*dx+dy*dy)||1;
  var sign = dy>5 ? -1 : dy<-5 ? 1 : 0;
  return {x: mx+(-dy/len)*55*sign, y: my+(dx/len)*55*sign};
}

function rgba(hex,a) {
  var h=hex.replace('#','');
  return 'rgba('+parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16)+','+a+')';
}

function savePosNorm(id, px, py) {
  positions[id] = {x: px/cw, y: py/mapH};
  try { localStorage.setItem(LS_POS, JSON.stringify(positions)); } catch(e){}
}

/* ── DOM REFS ──────────────────────────────────────────────────────── */
var mapEl = document.getElementById('map');
var svgEl = document.getElementById('svg-lines');
var wpContainer = document.getElementById('waypoints-container');
var expandedOverlay = document.getElementById('expanded-overlay');
var expandedCard = document.getElementById('expanded-card');
var cardPhoto = document.getElementById('card-photo');
var cardMeta = document.getElementById('card-meta');
var cardTitle = document.getElementById('card-title');
var cardAbs = document.getElementById('card-abs');
var cardLink = document.getElementById('card-link');

/* ── DRAG STATE ────────────────────────────────────────────────────── */
var _drag = null;
var _cpDrag = null;
var _suppressClick = false;

/* ── WAYPOINT ELEMENTS ─────────────────────────────────────────────── */
var wpEls = {};

function createWaypoint(note) {
  var el = document.createElement('div');
  el.className = 'waypoint';
  el.setAttribute('data-id', note.id);
  el.setAttribute('tabindex', '0');
  el.setAttribute('role', note.status==='LIVE' ? 'link' : 'note');

  var dot = document.createElement('div');
  dot.className = 'wp-dot';
  el.appendChild(dot);

  var info = document.createElement('div');
  el.appendChild(info);

  el.addEventListener('pointerdown', function(e) {
    if (!DRAFT_MODE) return;
    if (e.button !== undefined && e.button !== 0) return;
    var P = posOf(note.id);
    _drag = {id:note.id, sx:e.clientX, sy:e.clientY, ox:P.x, oy:P.y, moved:false};
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });

  el.addEventListener('click', function(e) {
    e.stopPropagation();
    if (_suppressClick) return;
    if (note.status === 'LIVE') {
      expandedId = (expandedId === note.id) ? null : note.id;
      render();
    } else {
      triggerShake(note.id);
    }
  });

  el.addEventListener('keydown', function(e) {
    if (e.key==='Enter'||e.key===' ') { e.preventDefault(); el.click(); }
  });

  el.addEventListener('mouseenter', function() {
    if (!_drag) { hoverId = note.id; render(); }
  });
  el.addEventListener('mouseleave', function() {
    if (hoverId === note.id) { hoverId = null; render(); }
  });

  wpContainer.appendChild(el);
  wpEls[note.id] = {el: el, dot: dot, info: info};
}

NOTES.forEach(createWaypoint);

/* ── SHAKE ─────────────────────────────────────────────────────────── */
function triggerShake(id) {
  shakeId = id;
  render();
  setTimeout(function() { shakeId = null; render(); }, 430);
}

/* ── DRAG ──────────────────────────────────────────────────────────── */
function onMove(e) {
  if (!_drag) return;
  var dx = e.clientX-_drag.sx, dy = e.clientY-_drag.sy;
  if (!_drag.moved && Math.hypot(dx,dy)>4) {
    _drag.moved = true;
    dragId = _drag.id;
    expandedId = null;
    render();
  }
  if (_drag.moved) {
    var nx = Math.max(0.02, Math.min(0.97, (_drag.ox+dx)/cw));
    var ny = Math.max(0.05, Math.min(0.95, (_drag.oy+dy)/mapH));
    positions[_drag.id] = {x:nx, y:ny};
    render();
  }
}

function onUp() {
  var d = _drag; _drag = null;
  window.removeEventListener('pointermove', onMove);
  window.removeEventListener('pointerup', onUp);
  if (d && d.moved) {
    _suppressClick = true;
    setTimeout(function(){_suppressClick=false;}, 60);
    try { localStorage.setItem(LS_POS, JSON.stringify(positions)); } catch(e){}
    dragId = null;
    render();
  }
}

/* ── CP DRAG ───────────────────────────────────────────────────────── */
function startCpDrag(eid, a, b, clientX, clientY) {
  var cp = gc(eid, a, b);
  _cpDrag = {id:eid, sx:clientX, sy:clientY, ox:cp.x, oy:cp.y};
  window.addEventListener('pointermove', onCpMove);
  window.addEventListener('pointerup', onCpUp);
}

function onCpMove(e) {
  if (!_cpDrag) return;
  var dx = e.clientX-_cpDrag.sx, dy = e.clientY-_cpDrag.sy;
  cps[_cpDrag.id] = {x:(_cpDrag.ox+dx)/cw, y:(_cpDrag.oy+dy)/mapH};
  render();
}

function onCpUp() {
  try { localStorage.setItem(LS_CPS, JSON.stringify(cps)); } catch(e){}
  _cpDrag = null;
  window.removeEventListener('pointermove', onCpMove);
  window.removeEventListener('pointerup', onCpUp);
}

/* ── DRAFT-MODE EXPORT ─────────────────────────────────────────────── */
var draftExportBtn = document.getElementById('draft-export-btn');
if (draftExportBtn) {
  draftExportBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    var out = { DEFAULTS: positions, cps: cps };
    var json = JSON.stringify(out, null, 2);
    console.log('STORYLINE Positionen/Kurven (Draft-Mode Export):\n' + json);
    var restore = draftExportBtn.textContent;
    var done = function(ok) {
      draftExportBtn.textContent = ok ? 'Kopiert! (auch in Konsole)' : 'Siehe Browser-Konsole';
      setTimeout(function(){ draftExportBtn.textContent = restore; }, 2000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(json).then(function(){done(true);}, function(){done(false);});
    } else {
      done(false);
    }
  });
}

/* ── CLOSE CARD ────────────────────────────────────────────────────── */
mapEl.addEventListener('click', function() { expandedId = null; render(); });
expandedOverlay.addEventListener('click', function() { expandedId = null; render(); });
expandedCard.addEventListener('click', function(e) { e.stopPropagation(); });
expandedCard.addEventListener('pointerdown', function(e) { e.stopPropagation(); });

/* ── SVG HELPERS ───────────────────────────────────────────────────── */
var NS = 'http://www.w3.org/2000/svg';
var pathEls = {};
var cpEls = {};

function getOrCreate(tag, key, parent, attrs) {
  if (!pathEls[key]) {
    var el = document.createElementNS(NS, tag);
    parent.appendChild(el);
    pathEls[key] = el;
  }
  var el = pathEls[key];
  for (var k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function getOrCreateCp(key, eid, a, b) {
  if (!cpEls[key]) {
    var el = document.createElementNS(NS, 'circle');
    el.setAttribute('r','10');
    el.setAttribute('fill','rgba(200,160,80,.3)');
    el.setAttribute('stroke','rgba(120,70,20,.6)');
    el.setAttribute('stroke-width','1.5');
    el.classList.add('cp-handle');
    (function(capturedEid, capturedA, capturedB) {
      el.addEventListener('mousedown', function(e) {
        if (!DRAFT_MODE) return;
        e.stopPropagation();
        startCpDrag(capturedEid, posOf(capturedEid.split('-')[0]), posOf(capturedEid.split('-')[1]), e.clientX, e.clientY);
      });
      el.addEventListener('touchstart', function(e) {
        if (!DRAFT_MODE) return;
        e.preventDefault();
        e.stopPropagation();
        startCpDrag(capturedEid, posOf(capturedEid.split('-')[0]), posOf(capturedEid.split('-')[1]), e.touches[0].clientX, e.touches[0].clientY);
      });
    })(eid, a, b);
    svgEl.appendChild(el);
    cpEls[key] = el;
  }
  return cpEls[key];
}

/* ── RENDER ────────────────────────────────────────────────────────── */
function render() {
  var accent = '#7d4a23', accentDeep = '#5e3717', line = '#bd9f7e';

  /* Resize SVG */
  svgEl.setAttribute('width', cw);
  svgEl.setAttribute('height', mapH);
  svgEl.setAttribute('viewBox', '0 0 '+cw+' '+mapH);

  /* Draw connection lines */
  NOTES.forEach(function(n) {
    (n.geht_nach||[]).forEach(function(e) {
      var eid = n.id+'-'+e.ref;
      var a = posOf(n.id), b = posOf(e.ref);
      var cp = gc(eid, a, b);
      var hot = hoverId===n.id || hoverId===e.ref;
      var pulsing = (hoverId===n.id || hoverId===e.ref) && !expandedId;
      var d = 'M '+a.x.toFixed(1)+' '+a.y.toFixed(1)+' Q '+cp.x.toFixed(1)+' '+cp.y.toFixed(1)+' '+b.x.toFixed(1)+' '+b.y.toFixed(1);

      getOrCreate('path', 'path-'+eid, svgEl, {
        d: d,
        fill: 'none',
        stroke: hot ? accent : line,
        'stroke-width': hot ? '2.2' : '1.5',
        'stroke-linecap': 'round',
        style: pulsing ? 'animation:linePulse 2.4s ease-in-out infinite' : ''
      });

      var cpEl = getOrCreateCp('cp-'+eid, eid, a, b);
      cpEl.setAttribute('cx', cp.x.toFixed(1));
      cpEl.setAttribute('cy', cp.y.toFixed(1));
    });
  });

  /* Update waypoints */
  NOTES.forEach(function(n) {
    var isLive = n.status === 'LIVE';
    var hovered = hoverId === n.id;
    var expanded = expandedId === n.id;
    var shaking = shakeId === n.id;
    var dragging = dragId === n.id;
    var P = posOf(n.id);
    var left = Math.round(P.x - 6.5);
    var top = Math.round(P.y);

    var ref = wpEls[n.id];
    if (!ref) return;
    var el = ref.el, dot = ref.dot, info = ref.info;

    /* Position */
    el.style.left = left+'px';
    el.style.top = top+'px';
    el.style.cursor = !DRAFT_MODE ? 'pointer' : (dragging ? 'grabbing' : 'grab');
    el.style.zIndex = expanded ? '60' : dragging ? '55' : hovered ? '30' : '10';
    el.style.animation = shaking ? 'wpshake .43s ease' : '';
    el.setAttribute('aria-label', isLive ? n.kurztitel+' — Note öffnen' : n.kurztitel+' — angekündigt');

    /* Dot */
    if (isLive) {
      var pulseAnim = hovered && !expanded ? 'animation:wpPulse 2.4s ease-in-out infinite' : '';
      dot.style.cssText = 'width:13px;height:13px;border-radius:50%;flex:none;background:'+accent+';box-shadow:0 0 0 5px #ede6d4,0 0 0 '+(hovered?7.5:6.5)+'px '+rgba(accent,hovered?.85:.5)+';'+pulseAnim;
    } else {
      dot.style.cssText = 'width:12px;height:12px;border-radius:50%;flex:none;background:#ede6d4;border:1.5px dashed #b8a78d;box-shadow:0 0 0 5px #ede6d4;opacity:.85';
    }

    /* Info */
    info.style.minWidth = '0';
    if (isLive) {
      info.innerHTML =
        '<div class="wp-meta">'+n.id+' &middot; '+fmt(n.datum)+'</div>'+
        '<div class="wp-title" style="color:'+(hovered?accentDeep:'#191713')+';font-size:'+(hovered?'1.02rem':'.94rem')+'">'+n.kurztitel+'</div>'+
        (hovered && !expanded ? '<div class="wp-hint">&ouml;ffnen &rarr;</div>' : '');
    } else {
      info.innerHTML =
        '<div class="wp-ann-meta">'+n.id+' &middot; '+fmt(n.datum)+'</div>'+
        '<div class="wp-ann-title">'+n.kurztitel+'</div>'+
        '<div class="wp-ann-pub">'+(n.datum_publish ? 'erscheint '+fmt(n.datum_publish) : 'Termin offen')+'</div>';
    }
  });

  /* Expanded card */
  var expNote = expandedId ? NOTES.find(function(n){return n.id===expandedId;}) : null;
  if (expNote && expNote.status === 'LIVE') {
    var hasHero = !!expNote.hero;
    var hv = '46,26,14'; /* Espresso-Braun 260706, ersetzt alte V6.05-Schwarzbraun-Schattierung */
    var veil = 'radial-gradient(140% 140% at 0% 0%,rgba('+hv+',.95) 0%,rgba('+hv+',.8) 28%,rgba('+hv+',.4) 54%,rgba('+hv+',0) 80%)';
    var tsh = hasHero ? '0 1px 8px rgba(20,12,4,.7)' : 'none';

    expandedOverlay.style.display = 'block';
    expandedCard.style.display = 'block';

    if (hasHero) {
      cardPhoto.style.backgroundImage = veil+',url("'+expNote.hero+'")';
      cardPhoto.style.minHeight = '220px';
      cardMeta.style.color = '#ffd9a8';
      cardTitle.style.color = '#fffaf0';
      cardAbs.style.color = '#f6ecdd';
      cardLink.style.color = '#ffd9a8';
      cardLink.style.borderBottomColor = '#ffd9a8';
    } else {
      cardPhoto.style.backgroundImage = 'none';
      cardPhoto.style.minHeight = 'auto';
      cardMeta.style.color = '#9a8d7b';
      cardTitle.style.color = '#241c12';
      cardAbs.style.color = '#2c2620';
      cardLink.style.color = accentDeep;
      cardLink.style.borderBottomColor = accent;
    }
    cardMeta.textContent = expNote.id+' · '+fmt(expNote.datum);
    cardTitle.textContent = expNote.titel;
    cardAbs.textContent = expNote.abstract||'Abstract folgt.';
    cardLink.href = expNote.url||'#';
    cardMeta.style.textShadow = cardTitle.style.textShadow = cardAbs.style.textShadow = cardLink.style.textShadow = tsh;
  } else {
    expandedOverlay.style.display = 'none';
    expandedCard.style.display = 'none';
  }
}

/* ── RESIZE ────────────────────────────────────────────────────────── */
window.addEventListener('resize', function() {
  cw = window.innerWidth;
  mapH = window.innerHeight;
  render();
});

/* ── INIT ──────────────────────────────────────────────────────────── */
render();

})();
</script>
</body>
</html>
